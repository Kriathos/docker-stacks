events {}

http {
  # Pagina html estatica Ngnix
  server {
    listen 80;
    location / {
      root /usr/share/nginx/html;
      index index.html;
    }
  }

  # SFTPGo Web UI
  server {
    listen 80;
    server_name sftp.luispicado.com;

    location / {
      proxy_pass http://sftpgo:51500; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # MinIO API
  server {
    listen 80;
    server_name minio-api.luispicado.com;

    location / {
      proxy_pass http://minio:9000; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # MinIO Console
  server {
    listen 80;
    server_name minio.luispicado.com;

    location / {
      proxy_pass http://minio:9001; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Apache File Server
  server {
    listen 80;
    server_name data.luispicado.com;

    location / {
      proxy_pass http://apache-fileserver:80; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Kraft Kafka UI
  server {
    listen 80;
    server_name kraft-ui.luispicado.com;
  
    location / {
      proxy_pass http://kafka-ui-kraft:8080; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Kraft Kafka Connect API
  server {
    listen 80;
    server_name kraft-api.luispicado.com;

    location / {
      proxy_pass http://kafka-connect-kraft:8083; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Zookeeper Kafka UI
  server {
    listen 80;
    server_name zoo-ui.luispicado.com;
  
    location / {
      proxy_pass http://kafka-ui-zoo:8080; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Zookeeper Kafka Connect API
  server {
    listen 80;
    server_name zoo-api.luispicado.com;

    location / {
      proxy_pass http://kafka-connect-zoo:8083; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Jupyter Notebooks
  server {
    listen 80;
    server_name jupyter.luispicado.com;

    location / {
      proxy_pass http://jupyter:8888; # Nombre del servicio + puerto en docker
      proxy_http_version 1.1;

      # Cabeceras necesarias para WebSocket
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

      # Cabeceras estándar
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Tiempo de espera más largo para sesiones interactivas
      proxy_read_timeout 86400;
    }
  }

  # MLflow
  server {
    listen 80;
    server_name mlflow.luispicado.com;

    location / {
      proxy_pass http://mlflow:5000; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Airflow Webserver
  server {
    listen 80;
    server_name airflow.luispicado.com;

    location / {
      proxy_pass http://airflow-webserver:8080; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Vault
  server {
    listen 80;
    server_name vault.luispicado.com;

    location / {
      proxy_pass http://vault:8200; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # Spark Master UI
  server {
    listen 80;
    server_name spark.luispicado.com;

    location / {
      proxy_pass http://spark:8080; # Nombre del servicio + puerto en docker
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}