version: "3.9"

networks:
  mynet:
    external: true

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_html:/usr/share/nginx/html # volumen persistente para pagina estatica
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # volumen persistente para reverse proxy
    networks:
      - mynet

volumes:
  nginx_html: